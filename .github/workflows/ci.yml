name: Drupal 11 Quality Gate

on:
  push:
  pull_request:

jobs:
  quality-assurance:
    name: PHP 8.3 Coding Standards & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: dom, curl, mbstring, zip

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer install --no-interaction --no-progress --prefer-dist
          echo "$GITHUB_WORKSPACE/vendor/bin" >> $GITHUB_PATH

      - name: Run PHPCS (Drupal standards)
        run: |
          # Uses phpcs.xml.dist generated by the guardrails toolkit
          vendor/bin/phpcs

      - name: Run PHPStan (Drupal-aware static analysis)
        run: |
          # Uses phpstan.neon generated by the guardrails toolkit
          vendor/bin/phpstan analyse --no-progress

      - name: Run Psalm (security-focused type analysis)
        run: |
          # Uses psalm.xml generated by the guardrails toolkit
          vendor/bin/psalm --config=psalm.xml --no-progress

      - name: Drupal deprecation scan
        run: |
          # Finds deprecated Drupal API usage via PHPStan + mglaman/phpstan-drupal.
          # Essential before any core upgrade. Advisory only (|| true) so legacy
          # deprecations do not block PRs on existing projects.
          composer run guardrails:drupal-check || true

      - name: Security advisory scan
        run: |
          composer audit --no-interaction
